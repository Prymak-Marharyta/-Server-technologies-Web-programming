<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Додати курс</title>
</head>
<body>
  <h1>Додати курс</h1>

  <nav>
    <a href="/index.html">Головна</a> |
    <a href="/login.html">Вхід</a>
  </nav>

  <form id="createForm">
    <input type="text" id="name" placeholder="Назва курсу" required>
    <br><br>

    <textarea id="description" placeholder="Опис курсу"></textarea>
    <br><br>

    <input type="number" id="price" placeholder="Ціна" required>
    <br><br>

    <input type="text" id="category" placeholder="Категорія" required>
    <br><br>

    <button type="submit">Додати курс</button>
  </form>

  <p id="message"></p>

  <script>
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = '/login.html';
    }

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const body = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value,
        price: Number(document.getElementById('price').value),
        category: document.getElementById('category').value
      };

      const response = await fetch('/api/courses', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (!response.ok) {
        document.getElementById('message').textContent = data.message;
        return;
      }

      document.getElementById('message').textContent = 'Курс успішно додано!';

      setTimeout(() => {
        window.location.href = '/index.html';
      }, 1000);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Список курсів</title>
</head>
<body>
  <h1>Список курсів</h1>

  <nav>
    <a href="/login.html">Увійти</a> |
    <a href="/register.html">Реєстрація</a> |
    <a href="/create.html">Додати курс</a>
  </nav>

  <br>

  <button id="logoutBtn">Вийти</button>

  <p id="message"></p>

  <ul id="courseList"></ul>

  <script>
    const API_URL = 'http://localhost:3000';

    async function loadCourses() {
      const response = await fetch(`${API_URL}/api/courses`, {
        credentials: 'include'
      });

      const data = await response.json();

      const list = document.getElementById('courseList');
      const message = document.getElementById('message');

      if (!response.ok) {
        message.textContent = data.message;
        return;
      }

      if (!data.data || data.data.length === 0) {
        list.innerHTML = '<li>Курсів поки немає</li>';
        return;
      }

      list.innerHTML = data.data.map(course => `
        <li>
          <strong>${course.name}</strong><br>
          Категорія: ${course.category}<br>
          Ціна: ${course.price}<br>
          Опис: ${course.description || 'Опис відсутній'}<br>

          <a href="/review.html?courseId=${course._id}">
            Залишити відгук
          </a>
        </li>
        <br>
      `).join('');
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch(`${API_URL}/api/auth/logout`, {
        method: 'POST',
        credentials: 'include'
      });

      window.location.href = '/login.html';
    });

    loadCourses();
  </script>
</body>
</html>
